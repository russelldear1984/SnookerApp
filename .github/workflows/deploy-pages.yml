name: Deploy Next.js static export to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve base path
        id: base_path
        shell: bash
        run: |
          if [ -n "${{ vars.PAGES_BASE_PATH }}" ]; then
            echo "value=${{ vars.PAGES_BASE_PATH }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.repository_owner }}" = "${{ github.event.repository.name }}" ] || [ "${{ github.event.repository.name }}" = "${{ github.repository_owner }}.github.io" ]; then
            echo "value=" >> "$GITHUB_OUTPUT"
          else
            echo "value=/${{ github.event.repository.name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build static export
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.base_path.outputs.value }}
        run: npm run build

      - name: Ensure no Jekyll processing
        run: touch out/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
